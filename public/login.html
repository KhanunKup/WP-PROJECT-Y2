<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/public/css/login.css">
    <title>Login to Warehouse</title>
</head>

<body>
    <nav>
        <img src="/public/images/logo-pic.svg">
        <div>
            <h1 class="easymanage" style="color: #1750AC;">EASYMANAGE</h1>
            <h3 style="color: #E67E22;">WAREHOUSE MANAGEMENT SYSTEM</h3>
        </div>
    </nav>

    <div class="body-element">
        <div class="main-form">
            <div class="inside-header">
                <div class="text-head">
                    <h1 style="font-size: 36px;">ยินดีต้อนรับ!</h1>
                    <h2>เข้าสู่ระบบจัดการคลังสินค้า</h2>
                </div>
                <img src="/public/images/login-box-pic.svg" class="box">
            </div>

            <div class="container">
                <form action="/" method="post">
                    <p class="username">
                        <img src="/public/images/login-lock-pic.svg" style="margin-top: 25px;" class="imgUser">
                        <input type="text" name="user" placeholder="กรุณากรอกชื่อผู้ใช้..."> <br>
                    </p>

                    <p class="username">
                        <img src="/public/images/login-user-pic.svg" style="margin-top: 25px;" class="imgPwd">
                        <input type="text" name="pass" placeholder="กรุณากรอกรหัสผ่าน...">
                    </p>

                    <h4><span style="color: rgb(223, 0, 0);">หมายเหตุ</span> : หากลืมรหัสผ่าน โปรดติดต่อผู้จัดการ</h4>
                    <p style="text-align: center;"><input type="button" value="เข้าสู่ระบบ" id="btn"></p>
                </form>
                <span id="datetime-display" style="width: 100%; text-align: right; margin-right: 10%; margin-top: 20px;"></span>
            </div>
        </div>
    </div>
</body>

<script>
    function updateTime() {
        const now = new Date();
        const options = { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            hour: '2-digit', 
            minute: '2-digit', 
            second: '2-digit'
        };

        const timeString = now.toLocaleDateString('th-TH', options);
        document.getElementById('datetime-display').innerText = timeString;
    }
    updateTime();
    setInterval(updateTime, 1000);
</script>

</html>
