<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/create-warehouse.css">
    <title>Create Warehouse</title>
</head>

<body>
    <nav>
        <img src="/images/logo-pic.svg">
        <div>
            <h1 class="easymanage" style="color: #1750AC;">EASYMANAGE</h1>
            <h3 style="color: #E67E22;">WAREHOUSE MANAGEMENT SYSTEM</h3>
        </div>
    </nav>

    <div class="body-element">
        <div class="main-form">
            <div class="inside-header">
                <div class="text-head">
                    <h1 style="font-size: 36px;">สร้างคลังสินค้า</h1>
                </div>
                <img src="/images/login-box-pic.svg" class="box">
            </div>

            <div class="container">
                <form id="createForm">
                    <div class="warehouse-name">
                        <h2 style="margin-left: 5%; width: 25%;">ชื่อคลังสินค้า</h2>
                        <input type="text" id="wh-name" name="wh-name" placeholder="กรุณากรอกชื่อคลังสินค้า..."> <br>
                    </div>

                    <div class="warehouse-add">
                        <h2 style="margin-left: 5%; width: 25%;">ที่อยู่คลังสินค้า</h2>
                        <textarea placeholder="กรุณากรอกที่อยู่คลังสินค้า" id="wh-add" name="wh-add" style="resize: none;"></textarea>
                    </div>

                    <p style="text-align: center; margin-top: 2%;"><button type="submit" id="btn">สร้างคลังสินค้า</button></p>
                </form>
                <span id="datetime-display" style="width: 100%; text-align: right; margin-right: 10%; margin-top: 20px;"></span>
            </div>
        </div>
    </div>
</body>
<script src="/sweetalert/sweetalert2.all.min.js"></script> 
<script src="/js/add-warehouse.js"></script>
<script>
    function updateTime() {
        const now = new Date();
        const options = { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            hour: '2-digit', 
            minute: '2-digit', 
            second: '2-digit'
        };

        const timeString = now.toLocaleDateString('th-TH', options);
        document.getElementById('datetime-display').innerText = timeString;
    }
    updateTime();
    setInterval(updateTime, 1000);
</script>

</html>
